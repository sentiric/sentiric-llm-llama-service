# .github/workflows/build-and-push.yml
name: CI - Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile
            tag_suffix: ""
          - dockerfile: Dockerfile.gpu
            tag_suffix: "-gpu"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. DİSK TEMİZLİĞİ: Llama buildleri için ~20GB alan açar (Ağır C++ buildleri için şart)
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. SUTS v4.0 İÇİN METADATA HAZIRLAMA (CMake'ten versiyon okur)
      - name: Prepare Build Metadata
        id: prep
        run: |
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
          echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          VERSION=$(grep 'set(APP_VERSION' CMakeLists.txt | awk -F '\"' '{print $2}')
          echo "SERVICE_VERSION=$VERSION" >> $GITHUB_ENV

      # 3. ÇALIŞAN ORİJİNAL ETİKETLEME MEKANİZMASI
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=,suffix=${{ matrix.tag_suffix }}
            type=raw,value=latest${{ matrix.tag_suffix }}
            type=raw,value=${{ env.SERVICE_VERSION }}${{ matrix.tag_suffix }}

      # 4. ÇALIŞAN ORİJİNAL BUILD ADIMI + SUTS v4.0 DEĞİŞKENLERİ
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Argümanları Dockerfile'a iletiyoruz
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            GIT_COMMIT=${{ env.GIT_COMMIT }}
            SERVICE_VERSION=${{ env.SERVICE_VERSION }}