name: CI - Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile
            tag_suffix: ""
          - dockerfile: Dockerfile.gpu
            tag_suffix: "-gpu"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. DİSK TEMİZLİĞİ: Llama buildleri için alan aç
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      # 2. KRİTİK DÜZELTME: Buildx Builder Kurulumu
      # Bu adım 'docker-container' driver'ını aktif eder ve 'gha' cache desteğini getirir.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. REGISTRY LOGIN
      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. ARGÜMANLARI HAZIRLA (CMake v1.2.0 Senkronizasyonu)
      - name: Prepare Build Arguments
        id: prep
        run: |
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
          echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "SERVICE_VERSION=$(grep 'set(APP_VERSION' CMakeLists.txt | awk -F '\"' '{print $2}')" >> $GITHUB_ENV

      # 5. DERLE VE GÖNDER
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          # Önbellek artık 'docker-container' driver sayesinde çalışacak
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}:latest${{ matrix.tag_suffix }},enable=${{ github.ref == 'refs/heads/main' }}
            ghcr.io/${{ github.repository }}:${{ env.SERVICE_VERSION }}${{ matrix.tag_suffix }}
            ghcr.io/${{ github.repository }}:${{ env.SERVICE_VERSION }}-${{ env.GIT_COMMIT }}${{ matrix.tag_suffix }}
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            GIT_COMMIT=${{ env.GIT_COMMIT }}
            SERVICE_VERSION=${{ env.SERVICE_VERSION }}